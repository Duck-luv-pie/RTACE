# Minimal Prometheus config for RTACE local development.
# Scrapes detection engine (9091), containment engine (9093), and API (8000).
# When running Python components on the host, use host.docker.internal so
# Prometheus in Docker can reach them.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "rtace-detection-engine"
    static_configs:
      - targets: ["host.docker.internal:9091"]
    metrics_path: /metrics

  - job_name: "rtace-containment-engine"
    static_configs:
      - targets: ["host.docker.internal:9093"]
    metrics_path: /metrics

  - job_name: "rtace-api"
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics
